<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="55%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>

    <!-- Primary glow -->
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0078D7" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#0078D7" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0078D7" stop-opacity="0"/>
    </radialGradient>

    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38B6FF"/>
      <stop offset="100%" stop-color="#0078D7"/>
    </linearGradient>

    <!-- Freshness gauge gradient -->
    <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="50%" stop-color="#EAB308"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>

    <!-- Soft shadow filter -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <!-- Glow filter for accents -->
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Central glow -->
  <ellipse cx="600" cy="315" rx="520" ry="260" fill="url(#glow)"/>

  <!-- Left side: Phone / scan interface mockup -->
  <g transform="translate(180, 115)" filter="url(#softShadow)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="260" height="400" rx="28" fill="#151E2E" stroke="#1E2A3D" stroke-width="2"/>
    <!-- Screen -->
    <rect x="14" y="14" width="232" height="372" rx="20" fill="#0F172A"/>

    <!-- Scan frame corners -->
    <g stroke="#38B6FF" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M50 80 L50 55 L75 55"/>
      <path d="M185 55 L210 55 L210 80"/>
      <path d="M50 320 L50 345 L75 345"/>
      <path d="M185 345 L210 345 L210 320"/>
    </g>

    <!-- Scan line -->
    <rect x="55" y="95" width="150" height="2" rx="1" fill="#38B6FF" opacity="0.8">
      <animate attributeName="y" values="95;315;95" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Stylized fish silhouette inside scan frame -->
    <g transform="translate(130, 205)" opacity="0.9">
      <path d="M-55,-12 C-35,-32 15,-35 45,-15 L65,-28 L60,-5 L65,18 L45,5 C15,25 -35,22 -55,2 C-60,-2 -60,-8 -55,-12 Z" fill="#38B6FF" opacity="0.18"/>
      <path d="M-55,-12 C-35,-32 15,-35 45,-15 L65,-28 L60,-5 L65,18 L45,5 C15,25 -35,22 -55,2 C-60,-2 -60,-8 -55,-12 Z" fill="none" stroke="#38B6FF" stroke-width="2"/>
      <circle cx="25" cy="-8" r="3" fill="#38B6FF"/>
    </g>

    <!-- Result card overlay -->
    <g transform="translate(30, 260)">
      <rect x="0" y="0" width="200" height="110" rx="14" fill="#1A2535" stroke="#26354A" stroke-width="1"/>
      <text x="14" y="26" fill="#FFFFFF" font-family="Outfit, system-ui, sans-serif" font-size="13" font-weight="600">Bangus (Milkfish)</text>
      <text x="14" y="46" fill="#94A3B8" font-family="Inter, system-ui, sans-serif" font-size="10">Freshness Score</text>
      <!-- Mini gauge -->
      <rect x="14" y="58" width="172" height="6" rx="3" fill="#26354A"/>
      <rect x="14" y="58" width="138" height="6" rx="3" fill="url(#gaugeGrad)"/>
      <text x="14" y="88" fill="#FFFFFF" font-family="Outfit, system-ui, sans-serif" font-size="18" font-weight="700">92</text>
      <text x="42" y="88" fill="#4ADE80" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">Fresh</text>
      <text x="14" y="102" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="9">~2 days fridge shelf life</text>
    </g>
  </g>

  <!-- Right side: Brand text and feature chips -->
  <g transform="translate(540, 165)">
    <!-- Logo mark -->
    <g transform="translate(0, 0)">
      <circle cx="24" cy="24" r="24" fill="url(#accentGrad)" filter="url(#blueGlow)"/>
      <path d="M10,24 C14,16 26,14 34,20 L42,14 L40,24 L42,34 L34,28 C26,34 14,32 10,24 Z" fill="#FFFFFF"/>
      <circle cx="30" cy="22" r="2.5" fill="#0B1220"/>
    </g>

    <!-- Brand name -->
    <text x="64" y="34" fill="#FFFFFF" font-family="Outfit, system-ui, sans-serif" font-size="34" font-weight="700" letter-spacing="-0.5">SARI-ONE</text>

    <!-- Tagline -->
    <text x="0" y="78" fill="#CBD5E1" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500">Know the Species. Check the Freshness. All in One.</text>

    <!-- Feature chips -->
    <g transform="translate(0, 110)">
      <rect x="0" y="0" width="150" height="38" rx="19" fill="#151E2E" stroke="#1E2A3D" stroke-width="1"/>
      <circle cx="22" cy="19" r="5" fill="#38B6FF"/>
      <text x="35" y="23" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">AI Fish ID</text>

      <rect x="165" y="0" width="170" height="38" rx="19" fill="#151E2E" stroke="#1E2A3D" stroke-width="1"/>
      <circle cx="187" cy="19" r="5" fill="#4ADE80"/>
      <text x="200" y="23" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Freshness Score</text>

      <rect x="0" y="55" width="140" height="38" rx="19" fill="#151E2E" stroke="#1E2A3D" stroke-width="1"/>
      <circle cx="22" cy="74" r="5" fill="#EAB308"/>
      <text x="35" y="78" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">Market Price</text>

      <rect x="160" y="55" width="155" height="38" rx="19" fill="#151E2E" stroke="#1E2A3D" stroke-width="1"/>
      <circle cx="182" cy="74" r="5" fill="#F472B6"/>
      <text x="195" y="78" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">QR Sharing</text>
    </g>

    <!-- CTA hint -->
    <g transform="translate(0, 245)">
      <rect x="0" y="0" width="200" height="44" rx="22" fill="url(#accentGrad)" filter="url(#softShadow)"/>
      <text x="100" y="28" fill="#FFFFFF" font-family="Outfit, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Scan a fish now</text>
    </g>
  </g>

  <!-- Bottom URL -->
  <text x="600" y="590" fill="#64748B" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" text-anchor="middle">sarione.tech</text>
</svg>