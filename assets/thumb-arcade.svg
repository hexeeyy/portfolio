<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E1927"/>
      <stop offset="1" stop-color="#0B0A10"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8D7A8"/>
      <stop offset="1" stop-color="#F5E8C0"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#D9C099"/>
      <stop offset="1" stop-color="#F7E6C2"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#F9E9C8" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#F9E9C8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <pattern id="paper" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#000000" fill-opacity="0"/>
      <circle cx="4" cy="4" r="1.2" fill="#FFF4D1" fill-opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="620" cy="310" rx="430" ry="250" fill="url(#glow)"/>

  <g opacity="0.12">
    <rect x="60" y="60" width="1080" height="510" rx="32" fill="url(#paper)"/>
  </g>

  <g stroke="url(#gold)" stroke-width="4" fill="none">
