        <circle cx="60" cy="60" r="34" fill="#3F2E1F"/>
        <path d="M48 52 C52 40 68 36 78 46 L88 36 L94 58 L84 74 L76 66 C66 82 52 78 48 64 Z" fill="#E5D7AB"/>
