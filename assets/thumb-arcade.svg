      <text x="40" y="58" fill="#E7D8B2" font-family="Georgia, serif" font-size="24" font-weight="700">Portfolio Showcase</text>

      <g transform="translate(40, 90)">
        <rect x="0" y="0" width="620" height="18" rx="9" fill="#3D2D44"/>
        <rect x="0" y="34" width="520" height="14" rx="7" fill="#3D2D44"/>
        <rect x="0" y="58" width="320" height="14" rx="7" fill="#3D2D44"/>
        <rect x="0" y="82" width="460" height="14" rx="7" fill="#3D2D44"/>
        <rect x="0" y="106" width="380" height="14" rx="7" fill="#3D2D44"/>
      </g>

      <g transform="translate(520, 32)">
